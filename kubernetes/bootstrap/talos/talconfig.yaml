---
clusterName: homelab
talosVersion: v1.13.5
kubernetesVersion: v1.34.1
endpoint: https://192.168.30.100:6443
domain: k8s.local
allowSchedulingOnControlPlanes: false
nodes:
  - hostname: nuc-controlplane-1
    ipAddress: 192.168.30.10
    controlPlane: true
    installDisk: /dev/nvme0n1
    talosImageURL: factory.talos.dev/installer/613e1592b2da41ae5e265e8789429f22e121aab91cb4deb6bc3c0b6262961245
    machineSpec:
      secureboot: false
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: 48:21:0b:6f:f4:ca # enp1s0
        dhcp: false
        addresses:
          - 192.168.30.10/24 # Static IP
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.30.1
        vip:
          ip: "192.168.30.100"
    nameservers:
      - 1.1.1.1
      - 8.8.8.8
  - hostname: pi5-controlplane-2
    ipAddress: 192.168.30.12
    controlPlane: true
    installDisk: /dev/mmcblk0 # microSD card
    talosImageURL: factory.talos.dev/installer/7c149dacd0517d92241b83e73d52e4d86d1913a96630a837b758432d9362f14a
    machineSpec:
      secureboot: false
    volumes:
      - name: EPHEMERAL
        # EPHEMERAL is a "magic" name in Talos: it is a system volume, corresponding to "/var"
        # This means all the writeable directories are under this partition:
        # etcd, containerd images, logs, emptyDir, hostpath PVs, etc.
        provisioning:
          diskSelector:
            match: "disk.model.startsWith('Lexar SSD NM620')" # 256 GB size
          minSize: 100GiB
          grow: true # Volume grows to disk max size if possible
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: 88:a2:9e:4c:0a:46 # end0
        dhcp: false
        addresses:
          - 192.168.30.12/24 # Static IP
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.30.1
        vip:
          ip: "192.168.30.100"
    nameservers:
      - 1.1.1.1
      - 8.8.8.8
