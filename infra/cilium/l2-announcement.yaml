apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
    name: l2-announcement-policy
    namespace: kube-system
spec:
    externalIPs: true
    loadBalancerIPs: true
    interfaces:
        - enp1s0
    serviceSelector:
        matchLabels:
            ip-pool: internal
    nodeSelector:
        matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: DoesNotExist
